	<ol class="breadcrumb">
        <li><a href="#/dashboard">Dashboard</a></li>
        <li class="active">Cases</li>

<div class="container-fluid" ng-controller="CasesController">
    <div class="row" style="position: relative; top: -80px">
	    <div class="col-xs-3 pull-right text-right" >
		    <div class="btn-group" data-dropdown>
		      <button type="button" class="btn btn-default-alt dropdown-toggle alt-border" id="stageSelector">
		        <span ng-if="!filtered">Filter Applications by Stage</span><span ng-if="filtered">Selected Stage:</span>  &nbsp;
		        <i class="fa fa-caret-down"></i>
		      </button>
		      <ul class="dropdown-menu" role="menu" style="text-align: right;">
		         <li ng-repeat="stage in stages"><a class="dropdown-toggle" ></a></li>
		      </ul>
		    </div>
	    </div>
    </div>
    <div class="row">
        <div class="col-md-12">

          <div class="panel panel-primary" style="margin-top:-35px">
            <div class="panel-heading" style="background-color:#137ad4">
						 <h3 style="color:#ffffff; margin-top:5px">Case Management</h3>

								<a class="pull-right" style="color:#add8e6; border:#none; font-size:1.2em; border-radius:5px; margin-top:-32px" data-toggle="modal" data-target="#addCaseModal"><i class="fa fa-plus"></i></a>
					 </div>
					 <div class="panel-body">

        <form   enctype="multipart/form-data" accept-charset="utf-8" hidden="true"
        method="post" action=""  name="caseUpload">
              <input type="hidden" name="uploadApplications">
              <input type="file" required="true" onchange="checkUpload(event)" id="applicationFile"  name="application" />
              <input type="submit"  value="upload"  id="uploadApplicationBtn">
          </form>

            <div class="input-icon right mb10">
                  <i class="fa fa-search"></i>
                  <input type="text" ng-model="query" class="form-control" placeholder="Search..." id="Search">
            </div>
                <table id="casesTbl" class="table table-condensed">
                  <tr style="background-color: #E8E9EC" class="tableHeaders">
                    <td style="width:15%">
	                    <a ng-click="sortType = 'caseNumber'; sortReverse = !sortReverse">
		                    Case Number
		                    <span ng-show="sortType == 'caseNumber' && !sortReverse" class="fa fa-caret-up"></span>
		                    <span ng-show="sortType == 'caseNumber' && sortReverse" class="fa fa-caret-down"></span>
	                    </a>
		            </td>
                    <td style="width:35%">
	                    <a ng-click="sortType = 'name'; sortReverse = !sortReverse">
		                    Name
		                    <span ng-show="sortType == 'name' && !sortReverse" class="fa fa-caret-up"></span>
		                    <span ng-show="sortType == 'name' && sortReverse" class="fa fa-caret-down"></span>
	                    </a>
					</td>

                    <td style="width:15%">
	                    <a ng-click="sortType = 'areaOfLaw'; sortReverse = !sortReverse">
		                    Area of Law
		                    <span ng-show="sortType == 'areaOfLaw' && !sortReverse" class="fa fa-caret-up"></span>
		                    <span ng-show="sortType == 'areaOfLaw' && sortReverse" class="fa fa-caret-down"></span>
	                    </a>
		            </td>
                    <td style="width:15%">
	                    <a ng-click="sortType = 'courtId'; sortReverse = !sortReverse">
	                    	Court
	                    	<span ng-show="sortType == 'courtId' && !sortReverse" class="fa fa-caret-up"></span>
	                    	<span ng-show="sortType == 'courtId' && sortReverse" class="fa fa-caret-down"></span>
	                    </a>

	                </td>

                    <td style="width:10%">Actions</td>
                  </tr>
                  <tr id="rowTmp_Est" ng-repeat="case in cases | filter:query | orderBy:sortType:sortReverse" >
                      <td class="editables">

                      <span class="editable"  name="applicationID" form="rowform" onchange="editItem(this,'itemID')"
                        required>{{case.caseNumber}}

                      </span>

                    </td>

                    <td class="editables">

                      <span class="editable" name="applicantname" form="rowform" onchange="editItem(this,'itemID')"
                        required>{{case.name}}

                      </span>

                    </td>


                    <td class="editables">

                      <span class="editable" name="company" form="rowform" onchange="editItem(this,'itemID')">
													{{case.areaOfLaw.name}}
                      </span>
                    </td>

                    <td class="editables">

                      <span class="editable" name="stage" form="rowform" onchange="editItem(this,'itemID')">
														{{case.court.name}}
                      </span>
                    </td>



                    <td style="white-space: nowrap">
                      <!-- form -->
                      <form editable-form name="rowform"  ng-show="rowform.$visible" class="form-buttons form-inline" >
                        <button type="submit" ng-disabled="rowform.$waiting" class="btn btn-sm btn-primary">
                          Save
                        </button>
                        <button type="button" ng-disabled="rowform.$waiting" ng-click="rowform.$cancel()" class="btn btn-sm btn-default">
                          Cancel
                        </button>
                      </form>
                      <div class="buttons" ng-show="!rowform.$visible">
                          <!-- <a class="editItem" onclick="assignMentorModal(this)" ><i class="fa fa-edit"></i></a> -->

                          <a class="viewItem" onclick="viewApp(this)" itemid="{{application.applicationID}}"><i class="fa fa-eye"></i></a>&nbsp;
													<a data-user="Admin" class="editItem" data-toggle="modal" data-target="#addCaseModal" ng-click="openCase(case)" ><i class="fa fa-edit"></i></a>
                          <a class="viewItem" ><i class="fa fa-times"></i></a></a>

                          <!-- <a class="deleteItem" data-user="Admin" onclick="deleteEstimate(this,'itemID','Estimates.php','deleteEstimates','cleanRow', 'Estimates')"><i class="fa fa-trash-o"></i></a> -->
                      </div>
                    </td>
                  </tr>
                </table>



                <div ng-if="!showCases" style="position: relative; left: 50%; margin-left: -100px; height: 50px; margin-top: 40px"><i ng-if="!returned" class='fa fa-fw fa-sun-o fa-spin'></i> {{message}}</div>
								<div ng-if="cases.length == 0 && returned" style="position: relative; left: 48%; margin-left: -100px; height: 50px; margin-top: 40px">No cases found. Click <a data-toggle="modal" data-target="#addCaseModal">here</a> to create one.</div>
							</div>
					</div>
        </div>
      </div>


<ng-include src="'templates/add-case-modal.html'"></ng-include>
</div>

<ng-include src="'templates/area-of-law-modal.html'"></ng-include>
<ng-include src="'templates/court-modal.html'"></ng-include>
<ng-include src="'templates/legislation-modal.html'"></ng-include>
