<div ng-controller="LoginCtrl" style="background-color: #ffffff; width: 100%; height:100%; position: absolute; left: 0px">

	<div class="verticalcenter">

	<div class="panel" style="width: 350px; height: 500px; border: 1px solid #000000; border-radius:5px">

				<div class="panel-heading" style="height:auto; padding-top:20px; padding-bottom:20px">
					<div id="login_logo" style="position: relative; top: 0px; font-weight:200; color:#ffffff; font-size:2em; text-align:center"><img src="assets/img/login-logo.png" width="200px"/></div>
				</div>

				<div class="panel-body" style="background-color: #ffffff; padding-left: 40px; padding-right: 40px; padding-bottom:10px; height:200px; ">
						<!--img src="assets/img/logo-big5.png" alt="Logo" class="login" width="480px" /-->
						<br/>

						<form action="" class="form-horizontal" style="width: 94%; position:relative; left: 10px" novalidate>
							<div class="form-group" style="position: relative; top: 20px;">
								<div>
									<input type="text" id="userName" ng-model = "user.email" placeholder="Username" class="form-control">
								</div>
							</div>
							<div class="form-group" style="position: relative; top: 20px;">
								<div>
									<input type="password"  id="password" ng-model = "user.password" placeholder="Password" class="form-control">


								</div>
							</div>
							<div class="form-group" style="position: relative; top: 20px;">
								<button id="loginButton" class="btn btn-primary btn-lg btn-block" ng-click="login()">Login<i ng-class = "{'fa fa-times-circle text-danger': loginAttempt && !authenticated && !authenticating, 'glyphicon glyphicon-arrow-right': !loginAttempt && !authenticated && !authenticating, 'fa fa-circle-o-notch fa-spin fa-3x fa-fw':authenticating && !loginAttempt && !authenticated}" style="font-size:1.0em; position:absolute; right:20px; top:9px"></i></button>
							</div>
						</form>
		<!-- 				<button class="btn btn-primary" onclick="login()" style="width:100%">Log In</button> -->
				</div>


	</div>
	</div>
 </div>
