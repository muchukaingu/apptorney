<div ng-controller="LoginCtrl" style="background-color: #ffffff; width: 100%; height:100%; position: absolute; left: 0px">

	<div class="verticalcenter">

	<div class="panel" style="width: 350px; height: 344px; border: 1px solid #137ad4; border-radius:5px">

				<div class="panel-heading" style="height:auto; padding-top:20px; padding-bottom:20px">
					<div id="login_logo" style="position: relative; top: 0px; font-weight:200; color:#ffffff; font-size:2em; text-align:center"><img src="assets/img/logo@2x.png" width="100px"/></div>
				</div>

				<div class="panel-body" style="background-color: #137ad4; padding-left: 40px; padding-right: 40px; padding-bottom:40px; height:200px; ">
						<!--img src="assets/img/logo-big5.png" alt="Logo" class="login" width="480px" /-->
						<br/>

						<form action="" class="form-horizontal" style="width: 94%; position:relative; left: 10px" novalidate>
							<div class="form-group" style="position: relative; top: 20px;">
								<div>
									<input type="text" id="userName" ng-model = "user.email" placeholder="Username" style="border: none; height:40px; width: 100%; font-size: 1.2em;  border-radius:5px; padding-left:10px ">
								</div>
							</div>
							<div class="form-group" style="position: relative; top: 20px;">
								<div>
									<input type="password"  id="password" ng-model = "user.password" placeholder="Password" style="border: none;  height:40px; width: 100%; font-size: 1.2em; border-radius:5px; padding-left:10px">
									<button id="loginButton" class="btn btn-default-alt" ng-click="login()" style="border: none; position: relative; right:-225px; top:-40px; z-index: 1; font-size:large; color: silver; font-weight: 100"><i ng-class = "{'fa fa-times-circle text-danger': loginAttempt && !authenticated && !authenticating, 'glyphicon glyphicon-arrow-right': !loginAttempt && !authenticated && !authenticating, 'fa fa-circle-o-notch fa-spin fa-3x fa-fw':authenticating && !loginAttempt && !authenticated}" style="font-size:1.0em;"></i></button>

								</div>
							</div>


						</form>
		<!-- 				<button class="btn btn-primary" onclick="login()" style="width:100%">Log In</button> -->
				</div>


	</div>
	</div>
 </div>
