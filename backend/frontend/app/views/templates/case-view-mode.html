<div class="row" ng-if="viewMode">

      <div class="col-xs-12">


          <div class="row">

              <div class="col-lg-12">
                {{case.court.name}}
              </div>
              <div class="col-xs-12" ng-repeat="judge in case.coram">
                {{judge.name}}
              </div>
              <div class="col-xs-12">
                {{case.citation.code}}/{{case.citation.number}}/{{case.citation.year}}
              </div>

              <div class="col-xs-12">
                Flynote (Area of Law): {{case.areaOfLaw.name}}
              </div>


              <div class="col-xs-12">

                  <panel heading="Headnote (Summary of Facts)" >
                    <panel-controls>
                          <a href=""><panel-control-collapse class="fa fa-chevron-down"></panel-control-collapse></a>
                    </panel-controls>
                      <span style="white-space: pre-wrap;" ng-bind-html="case.summaryOfFacts"></span>
                  </panel>
              </div>


              <div class="col-xs-12">

                  <panel heading="Held (Summary of Ruling)" >
                    <panel-controls>
                          <a href=""><panel-control-collapse class="fa fa-chevron-down"></panel-control-collapse></a>
                    </panel-controls>
                      <span style="white-space: pre-wrap;" ng-bind-html="case.summaryOfRuling"></span>
                  </panel>
              </div>


              <div class="col-xs-12">
                <panel heading="Cases Referred To" >
                  <panel-controls>
                        <a href=""><panel-control-collapse class="fa fa-chevron-down"></panel-control-collapse></a>
                  </panel-controls>
                    <ol>
                      <li ng-repeat="ref in case.casesReferedTo">
                        {{ref.name}}
                      </li>
                    </ol>
                  </panel>
              </div>


              <div class="col-xs-12">
                <panel heading="Judgement" >
                  <panel-controls>
                        <a href=""><panel-control-collapse class="fa fa-chevron-down"></panel-control-collapse></a>
                  </panel-controls>

                  <span style="white-space: pre-wrap;" ng-bind-html="case.judgement"></span>
                </panel>
              </div>

          </div>


    </div>
</div>
