server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — serve index.html for any route Angular handles
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend ALB
    location /api/ {
        proxy_pass http://apptorney-prod-service-alb-1628366448.eu-west-2.elb.amazonaws.com/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support for streaming responses
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Cache static assets aggressively (Angular hashes filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint for ALB
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
