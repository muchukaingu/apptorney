<aside class="sidebar">
  <div class="sidebar__header">
    <h1>Apptorney AI</h1>
    <p class="brand-subtitle">Zambian case law and legislation assistant</p>
  </div>

  <button class="sidebar__new-chat" (click)="startNewChat.emit()">+ New chat</button>

  <nav class="sidebar__nav" aria-label="Primary">
    <button class="nav-btn nav-btn--with-icon" [class.is-active]="view === 'chat'" (click)="setView.emit('chat')">
      <img class="nav-btn__icon" src="/assets/images/icons/home.png" alt="" aria-hidden="true" />
      <span>Assistant</span>
    </button>
    <button class="nav-btn nav-btn--with-icon" [class.is-active]="view === 'cases'" (click)="setView.emit('cases')">
      <img class="nav-btn__icon" src="/assets/images/icons/cases.png" alt="" aria-hidden="true" />
      <span>Cases</span>
    </button>
    <button class="nav-btn nav-btn--with-icon" [class.is-active]="view === 'legislations'" (click)="setView.emit('legislations')">
      <img class="nav-btn__icon" src="/assets/images/icons/legislations.png" alt="" aria-hidden="true" />
      <span>Legislations</span>
    </button>
    <button class="nav-btn nav-btn--with-icon" [class.is-active]="view === 'subscription'" (click)="setView.emit('subscription')">
      <span class="nav-btn__icon-text" aria-hidden="true">$</span>
      <span>Subscription</span>
    </button>
    <button class="nav-btn nav-btn--with-icon" [class.is-active]="view === 'settings'" (click)="setView.emit('settings')">
      <img class="nav-btn__icon" src="/assets/images/icons/settings.png" alt="" aria-hidden="true" />
      <span>Settings</span>
    </button>
    <button *ngIf="isAdmin" class="nav-btn nav-btn--with-icon" [class.is-active]="view === 'admin'" (click)="setView.emit('admin')">
      <span class="nav-btn__icon-text" aria-hidden="true">⚙</span>
      <span>Admin</span>
    </button>
  </nav>

  <section class="sidebar__threads" aria-label="Conversations">
    <div class="sidebar__section-title">
      <h2>Conversations</h2>
      <button class="icon-btn" title="Refresh threads" (click)="refreshThreads.emit()">↻</button>
    </div>

    <ul class="thread-list" *ngIf="threads.length > 0; else noThreads">
      <li *ngFor="let thread of threads">
        <button class="thread-item" [class.is-active]="thread.id === currentThreadId" (click)="loadThread.emit(thread.id)">
          {{ normalizeThreadTitle(thread) }}
        </button>
      </li>
    </ul>

    <ng-template #noThreads>
      <article class="list-item">
        <h4>No conversations yet</h4>
      </article>
    </ng-template>
  </section>
</aside>
